name: Labs smoke (Mock backend)

on:
  push:
    branches: [main]
    paths:
      - 'labs/**'
      - 'tools/lab_specs.py'
      - 'tools/build_labs.py'
      - '.github/workflows/labs_smoke.yml'
  pull_request:
    paths:
      - 'labs/**'
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      LLM_BACKEND: mock
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('labs/requirements.txt') }}
          restore-keys: pip-

      - name: Cache torch hub (resnet18 weights for lab05)
        uses: actions/cache@v4
        with:
          path: ~/.cache/torch
          key: torchhub-resnet18-v1

      - name: Install runtime
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r labs/requirements.txt
          pip install jupyter nbconvert ipykernel

      - name: Execute every lab end-to-end (Mock LLM backend)
        shell: bash
        run: |
          set -e
          for nb in labs/lab*.ipynb; do
            echo "::group::Executing $nb"
            jupyter nbconvert --to notebook --execute --inplace --ExecutePreprocessor.timeout=300 "$nb"
            echo "::endgroup::"
          done

      - name: Print last printed message of each notebook
        shell: bash
        run: python tools/dump_lab_results.py
